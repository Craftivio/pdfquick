<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login or Sign Up Free — PDFQuick</title>
  <meta name="description" content="Login or create a free PDFQuick account to save your PDF file history and access all tools. Sign in with Google, GitHub, or email."/>
  <meta name="robots" content="noindex, follow"/>
  <meta name="theme-color" content="#3B6DFF"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <meta name="google-adsense-account" content="ca-pub-9212086908110813">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9212086908110813" crossorigin="anonymous"></script>

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G0KEV25F42"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-G0KEV25F42');
  </script>

  <style>
    /* Social login styles — scoped, doesn't fight style.css */
    .social-stack { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .social-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; width: 100%; padding: 12px 16px;
      border: 1px solid #E5E7EB; border-radius: 12px;
      background: #fff; color: #1F2937; font-weight: 600;
      font-size: 15px; cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .social-btn:hover:not(:disabled) { background: #F8FAFC; border-color: #CBD5E1; }
    .social-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .social-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .social-btn.github { background: #0F172A; color: #fff; border-color: #0F172A; }
    .social-btn.github:hover:not(:disabled) { background: #1E293B; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      color: #94A3B8; font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin: 4px 0 18px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #E5E7EB;
    }

    .privacy-note {
      margin-top: 16px; padding: 10px 14px;
      background: #F0FDF4; border: 1px solid #BBF7D0;
      border-radius: 10px; color: #166534;
      font-size: 12px; line-height: 1.5; text-align: center;
    }
    .privacy-note strong { color: #14532D; }

    .auth-message { padding: 12px 14px; border-radius: 10px; font-size: 14px; margin-top: 12px; }
    .auth-message.error { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
    .auth-message.success { background: #ECFDF5; color: #047857; border: 1px solid #A7F3D0; }
    .auth-message.hidden { display: none; }
  </style>
</head>
<body class="auth-page">
  <a href="index.html" class="back-link">← Back to PDFQuick</a>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo"><span class="logo-icon">⚡</span>PDFQuick</div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="showLoginTab('login')">Login</button>
        <button class="auth-tab" id="tab-signup" onclick="showLoginTab('signup')">Sign Up</button>
      </div>

      <!-- Social login buttons — work for both login & signup -->
      <div class="social-stack">
        <button class="social-btn" id="btn-google" onclick="signInWith('google')">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 18.9 13 24 13c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4c-7.7 0-14.4 4.4-17.7 10.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.5-4.5 2.4-7.2 2.4-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.3-4.1 5.7l6.2 5.2C40 35.5 44 30.2 44 24c0-1.3-.1-2.4-.4-3.5z"/>
          </svg>
          <span>Continue with Google</span>
        </button>

        <button class="social-btn github" id="btn-github" onclick="signInWith('github')">
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1-.7.1-.7.1-.7 1.2 0 1.9 1.2 1.9 1.2 1 1.8 2.8 1.3 3.5 1 0-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.2.5-2.3 1.3-3.1-.2-.4-.6-1.6 0-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.8 0 3.2.8.8 1.3 1.9 1.3 3.1 0 4.6-2.8 5.6-5.5 5.9.5.4.9 1.1.9 2.3v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/>
          </svg>
          <span>Continue with GitHub</span>
        </button>
      </div>

      <div class="divider">or with email</div>

      <!-- Login form -->
      <div id="form-login" class="auth-form">
        <div class="form-group"><label>Email address</label><input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/></div>
        <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/></div>
        <button class="btn btn-primary btn-full" onclick="doLogin()">Login to my account</button>
        <p class="auth-switch">No account? <a href="#" onclick="showLoginTab('signup');return false;">Sign up free</a></p>
      </div>

      <!-- Signup form -->
      <div id="form-signup" class="auth-form hidden">
        <div class="form-group"><label>Email address</label><input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email"/></div>
        <div class="form-group"><label>Password</label><input type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password"/></div>
        <button class="btn btn-primary btn-full" onclick="doSignup()">Create free account</button>
        <p class="auth-switch">Already have an account? <a href="#" onclick="showLoginTab('login');return false;">Login</a></p>
      </div>

      <div id="auth-message" class="auth-message hidden"></div>

      <div class="privacy-note">
        🔒 <strong>You don't need an account to use any tool.</strong><br/>
        Sign up only if you want to save your file history.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>

  <script>
    // ============ AUTH HANDLERS — inline so this page is self-contained ============

    function msg(text, kind){
      const el = document.getElementById('auth-message');
      if(!el) return;
      el.textContent = text;
      el.className = 'auth-message ' + (kind || 'error');
    }

    function setBusy(btnId, busy, busyText){
      const btn = document.getElementById(btnId);
      if(!btn) return;
      if(busy){
        btn.dataset.originalHtml = btn.innerHTML;
        btn.innerHTML = busyText || 'Working…';
        btn.disabled = true;
      } else {
        if(btn.dataset.originalHtml) btn.innerHTML = btn.dataset.originalHtml;
        btn.disabled = false;
      }
    }

    function showLoginTab(tab){
      document.getElementById('form-login').classList.toggle('hidden',  tab !== 'login');
      document.getElementById('form-signup').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('tab-login').classList.toggle('active',   tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active',  tab === 'signup');
      const m = document.getElementById('auth-message');
      if(m) m.className = 'auth-message hidden';
    }

    // OAuth sign-in (Google, GitHub) via Supabase
    async function signInWith(provider){
      if(typeof db === 'undefined' || !db.auth || !db.auth.signInWithOAuth){
        msg('Supabase not loaded. Check supabase.js.', 'error');
        return;
      }
      const btnId = provider === 'google' ? 'btn-google' : 'btn-github';
      const busyText = provider === 'google' ? 'Opening Google…' : 'Opening GitHub…';
      setBusy(btnId, true, busyText);

      try { gtag('event', 'login_attempt', { method: provider }); } catch(e){}

      // Redirect back to dashboard after OAuth completes
      const redirectTo = window.location.origin + '/dashboard.html';

      const { data, error } = await db.auth.signInWithOAuth({
        provider: provider,
        options: { redirectTo: redirectTo }
      });

      if(error){
        setBusy(btnId, false);
        // Most common errors and what they actually mean
        let hint = error.message;
        if(/provider is not enabled/i.test(error.message)){
          hint = provider + ' login is not enabled in your Supabase project. Enable it in Authentication → Providers.';
        } else if(/redirect/i.test(error.message)){
          hint = 'Redirect URL not allowed. Add ' + redirectTo + ' to Supabase → Authentication → URL Configuration → Redirect URLs.';
        }
        msg(hint, 'error');
        try { gtag('event', 'login_error', { method: provider, error: error.message }); } catch(e){}
      }
      // If no error, browser will redirect to provider — no need to clear busy state
    }

    // Email + password login
    async function doLogin(){
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if(!email || !password){ msg('Please fill in all fields.'); return; }

      const btn = document.querySelector('#form-login .btn-primary');
      const orig = btn.textContent;
      btn.textContent = 'Logging in…';
      btn.disabled = true;

      try { gtag('event', 'login_attempt', { method: 'email' }); } catch(e){}

      const { data, error } = await db.auth.signInWithPassword({ email, password });

      btn.textContent = orig;
      btn.disabled = false;

      if(error){
        msg(error.message, 'error');
        try { gtag('event', 'login_error', { method: 'email', error: error.message }); } catch(e){}
      } else {
        try { gtag('event', 'login', { method: 'email' }); } catch(e){}
        window.location.href = 'dashboard.html';
      }
    }

    // Email + password signup
    async function doSignup(){
      const email    = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;

      if(!email || !password){ msg('Please fill in all fields.'); return; }
      if(password.length < 6){ msg('Password must be at least 6 characters.'); return; }

      const btn = document.querySelector('#form-signup .btn-primary');
      const orig = btn.textContent;
      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try { gtag('event', 'sign_up_attempt', { method: 'email' }); } catch(e){}

      const { data, error } = await db.auth.signUp({ email, password });

      btn.textContent = orig;
      btn.disabled = false;

      if(error){
        msg(error.message, 'error');
        try { gtag('event', 'sign_up_error', { method: 'email', error: error.message }); } catch(e){}
      } else {
        msg('✅ Account created! If email confirmation is on, check your inbox.', 'success');
        try { gtag('event', 'sign_up', { method: 'email' }); } catch(e){}
      }
    }

    // Open signup tab if URL has #signup
    if(window.location.hash === '#signup'){ showLoginTab('signup'); }
  </script>
</body>
</html>
