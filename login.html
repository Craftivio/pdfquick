<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login or Sign Up Free — PDFQuick</title>
  <meta name="description" content="Login or create a free PDFQuick account to save your PDF file history and access all tools."/>
  <meta name="keywords" content="PDFQuick login, PDF tools account, sign up PDF tools free"/>
  <meta name="author" content="PDFQuick"/>
  <meta name="robots" content="noindex, follow"/>
  <link rel="canonical" href="https://usepdfquick.com/login.html"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://usepdfquick.com/login.html"/>
  <meta property="og:title" content="Login or Sign Up Free — PDFQuick"/>
  <meta property="og:description" content="Create a free PDFQuick account to save your file history."/>
  <meta property="og:image" content="https://usepdfquick.com/og-image.png"/>
  <meta property="og:site_name" content="PDFQuick"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Login or Sign Up Free — PDFQuick"/>
  <meta name="twitter:description" content="Create a free PDFQuick account to save your file history."/>
  <meta name="twitter:image" content="https://usepdfquick.com/og-image.png"/>
  <meta name="theme-color" content="#3B6DFF"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="apple-touch-icon" href="favicon.svg"/>
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebPage","name":"Login — PDFQuick","url":"https://usepdfquick.com/login.html"}</script>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    .social-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 13px;
    }
    .social-divider::before,
    .social-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: #1a1a1a;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 4px;
    }
    .btn-google:hover {
      border-color: #4285F4;
      background: #f8f9ff;
      box-shadow: 0 2px 8px rgba(66,133,244,0.15);
    }
    .btn-github {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #24292e;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 4px;
    }
    .btn-github:hover {
      background: #1a1f24;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .google-icon {
      width: 20px;
      height: 20px;
    }
    .github-icon {
      width: 20px;
      height: 20px;
      fill: white;
    }
    .social-loading {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body class="auth-page">
  <a href="index.html" class="back-link">← Back to PDFQuick</a>
  <div class="auth-container">
    <div class="auth-card">
      <h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Login or Sign Up — PDFQuick</h1>
      <div class="auth-logo"><span class="logo-icon">⚡</span>PDFQuick</div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Login</button>
        <button class="auth-tab" id="tab-signup" onclick="showTab('signup')">Sign Up</button>
      </div>

      <!-- Social Login Buttons -->
      <div style="margin-bottom:4px;">
        <button class="btn-google" onclick="handleGoogleLogin()" id="btn-google">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <button class="btn-github" onclick="handleGithubLogin()" id="btn-github">
          <svg class="github-icon" viewBox="0 0 24 24">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          Continue with GitHub
        </button>
      </div>

      <div class="social-divider">or continue with email</div>

      <!-- Email Login Form -->
      <div id="form-login" class="auth-form">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="login-email" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••"/>
        </div>
        <button class="btn btn-primary btn-full" onclick="handleLogin()">Login to my account</button>
        <p class="auth-switch">No account? <a href="#" onclick="showTab('signup')">Sign up free</a></p>
      </div>

      <!-- Email Signup Form -->
      <div id="form-signup" class="auth-form hidden">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="signup-email" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min. 6 characters"/>
        </div>
        <button class="btn btn-primary btn-full" onclick="handleSignup()">Create free account</button>
        <p class="auth-switch">Already have an account? <a href="#" onclick="showTab('login')">Login</a></p>
      </div>

      <div id="auth-message" class="auth-message hidden"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    if(window.location.hash === '#signup') { showTab('signup'); }

    async function handleGoogleLogin() {
      const btn = document.getElementById('btn-google');
      btn.textContent = '⏳ Connecting to Google...';
      btn.classList.add('social-loading');

      const { data, error } = await db.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: 'https://usepdfquick.com/dashboard.html'
        }
      });

      if (error) {
        btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
        btn.classList.remove('social-loading');
        showAuthMessage(error.message, 'error');
      }
    }

    async function handleGithubLogin() {
      const btn = document.getElementById('btn-github');
      btn.textContent = '⏳ Connecting to GitHub...';
      btn.classList.add('social-loading');

      const { data, error } = await db.auth.signInWithOAuth({
        provider: 'github',
        options: {
          redirectTo: 'https://usepdfquick.com/dashboard.html'
        }
      });

      if (error) {
        btn.innerHTML = `<svg class="github-icon" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg> Continue with GitHub`;
        btn.classList.remove('social-loading');
        showAuthMessage(error.message, 'error');
      }
    }
  </script>
</body>
</html>
