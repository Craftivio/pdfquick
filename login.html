<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login or Sign Up Free — PDFQuick</title>
  <meta name="description" content="Login or create a free PDFQuick account to save your PDF file history and access all 10 free PDF tools."/>
  <meta name="keywords" content="PDFQuick login, PDF tools account, sign up PDF tools free"/>
  <meta name="author" content="PDFQuick"/>
  <meta name="robots" content="noindex, follow"/>
  <link rel="canonical" href="https://usepdfquick.com/login.html"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://usepdfquick.com/login.html"/>
  <meta property="og:title" content="Login or Sign Up Free — PDFQuick"/>
  <meta property="og:description" content="Create a free PDFQuick account to save your file history."/>
  <meta property="og:image" content="https://usepdfquick.com/og-image.png"/>
  <meta property="og:site_name" content="PDFQuick"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="theme-color" content="#3B6DFF"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9212086908110813" crossorigin="anonymous"></script>
</head>
<body class="auth-page">
  <a href="index.html" class="back-link">← Back to PDFQuick</a>
  <div class="auth-container">
    <div class="auth-card">
      <h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Login or Sign Up — PDFQuick</h1>
      <div class="auth-logo"><span class="logo-icon">⚡</span>PDFQuick</div>

      <!-- GitHub OAuth button -->
      <button class="btn btn-github btn-full" onclick="handleGitHubLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="margin-right:8px;flex-shrink:0;">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        Continue with GitHub
      </button>

      <div class="auth-divider"><span>or continue with email</span></div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Login</button>
        <button class="auth-tab" id="tab-signup" onclick="showTab('signup')">Sign Up</button>
      </div>

      <div id="form-login" class="auth-form">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <button class="btn btn-primary btn-full" onclick="handleLogin()">Login to my account</button>
        <p class="auth-switch">No account? <a href="#" onclick="showTab('signup')">Sign up free</a></p>
      </div>

      <div id="form-signup" class="auth-form hidden">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password"/>
        </div>
        <button class="btn btn-primary btn-full" onclick="handleSignup()">Create free account</button>
        <p class="auth-switch">Already have an account? <a href="#" onclick="showTab('login')">Login</a></p>
      </div>

      <div id="auth-message" class="auth-message hidden"></div>

      <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:16px;line-height:1.6;">
        By signing up you agree to our <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>.
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    if (window.location.hash === '#signup') { showTab('signup'); }
  </script>
</body>
</html>
